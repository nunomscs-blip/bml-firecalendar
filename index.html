<!DOCTYPE html>
<html lang="pt">

<head>

    <!-- =======================================================
         CONFIGURAÇÃO DA PÁGINA
    ======================================================== -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BML FireCalendar</title>


    <!-- =======================================================
         FOLHAS DE ESTILO (CSS)
    ======================================================== -->

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- =======================================================
     CABEÇALHO
     ======================================================== -->

<header id="cabecalho">

    <div id="ladoEsquerdo">

        <button id="btnCancelar" class="btnCabecalho oculto">
            ✕
        </button>

        <h1 id="tituloApp"></h1>

    </div>

    <div id="acoesCabecalho">

        <button id="btnHoje" class="oculto">
            Hoje
        </button>

        <button id="btnConfiguracao" class="btnCabecalho">
            ⚙
        </button>

    </div>

</header>


    <!-- =======================================================
         ÁREA PRINCIPAL DA APLICAÇÃO
    ======================================================== -->

    <main id="app">

        <div id="calendario"></div>

    </main>

    <!-- =======================================================
     RODAPÉ
     ======================================================== -->

     <footer id="rodape"></footer>


    <!-- =======================================================
         BOTÃO NOVO EVENTO
    ======================================================== -->

    <button id="btnNovo">+</button>


    <!-- =======================================================
         SCRIPTS
         Ordem importante:
         1 - Configuração
         2 - Funções de datas
         3 - Calendário
         4 - Aplicação
    ======================================================== -->

    <!-- =======================================================
     MODAL DE EVENTO
======================================================== -->

     <div id="modalEvento" class="modal oculto">

          <div class="modalConteudo">

               <h2 id="tituloModal">Novo Evento</h2>

                <div class="campo">

                    <label for="tipoEvento">Tipo</label>

                    <select id="tipoEvento">

                    <option value="SAUDE">SAÚDE</option>

                    </select>

                </div>

                <div class="campo">

    <label for="turnoEvento">Turno</label>

    <select id="turnoEvento">

        <option value="D">Dia (07:00 - 19:00)</option>

        <option value="N">Noite (19:00 - 07:00)</option>

    </select>

            </div>

<div class="campo">

    <label>Dias selecionados</label>

    <div id="diasSelecionadosTexto">

        Nenhum dia selecionado.

    </div>

</div>

<div class="campo">

    <label for="observacoesEvento">

        Observações

    </label>

    <textarea
        id="observacoesEvento"
        rows="4"
        placeholder="Opcional"></textarea>

    </div>

               <div class="botoesModal">

                    <button id="btnCancelarEvento">
                    Cancelar
                    </button>

                    <button id="btnGuardarEvento">
                    Guardar
                    </button>

               </div>

          </div>

     </div>

     <!-- =======================================================
     MODAL CONFIGURAÇÃO
======================================================= -->

<div id="modalConfiguracao" class="modal oculto">

    <div class="modalConteudo">

        <h2>Configuração</h2>

        <div class="menuConfiguracao">

            <button id="btnTiposEvento">
                📁 Tipos de Evento
            </button>

            <button id="btnTurnos">
                🕒 Turnos
            </button>

            <button id="btnEquipas">
                👥 Equipas
            </button>

            <button id="btnLocais">
                📍 Locais
            </button>

            <button id="btnViaturas">
                🚑 Viaturas
            </button>

        </div>

        <div class="botoesModal">

            <button id="btnFecharConfiguracao">

                Fechar

            </button>

        </div>

    </div>

</div>

    <script src="js/config.js"></script>
    <script src="js/datas.js"></script>
    <script src="js/calendario.js"></script>
    <script src="js/database.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
