<!DOCTYPE html>
<html lang="pt">

<head>

    <!-- =======================================================
         CONFIGURAÇÃO DA PÁGINA
    ======================================================== -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BML FireCalendar</title>


    <!-- =======================================================
         FOLHAS DE ESTILO (CSS)
    ======================================================== -->

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- =======================================================
     CABEÇALHO
     ======================================================== -->

<header id="cabecalho">

    <h1>BML FireCalendar</h1>

    <button id="btnConfiguracao" title="Configuração">
        ⚙
    </button>

</header>


    <!-- =======================================================
         ÁREA PRINCIPAL DA APLICAÇÃO
    ======================================================== -->

    <main id="app">

        <div id="calendario"></div>

    </main>

    <!-- =======================================================
     RODAPÉ
     ======================================================== -->

     <footer id="rodape">

    BML FireCalendar, ns_production

     </footer>


    <!-- =======================================================
         BOTÃO NOVO EVENTO
    ======================================================== -->

    <button id="btnNovo">+</button>


    <!-- =======================================================
         SCRIPTS
         Ordem importante:
         1 - Configuração
         2 - Funções de datas
         3 - Calendário
         4 - Aplicação
    ======================================================== -->

    <!-- =======================================================
     MODAL DE EVENTO
======================================================== -->

     <div id="modalEvento" class="modal oculto">

          <div class="modalConteudo">

               <h2 id="tituloModal">Novo Evento</h2>

               <p>Formulário em desenvolvimento...</p>

               <div class="botoesModal">

                    <button id="btnCancelarEvento">
                    Cancelar
                    </button>

                    <button id="btnGuardarEvento">
                    Guardar
                    </button>

               </div>

          </div>

     </div>

    <script src="js/config.js"></script>
    <script src="js/datas.js"></script>
    <script src="js/calendario.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
